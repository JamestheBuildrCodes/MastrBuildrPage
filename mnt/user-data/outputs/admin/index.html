<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastr Buildr — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy: #0a1628; --navy2: #0f2040; --blue: #2563eb; --cyan: #00d9ff; --white: #f0f4ff; --muted: #8ba0c4; --green: #059669; --red: #dc2626; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: var(--navy2); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 3rem; width: 100%; max-width: 480px; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 800; color: var(--blue); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
  h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
  .sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2.5rem; line-height: 1.6; }
  .current-count { text-align: center; background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.25); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .count-num { font-family: 'Syne', sans-serif; font-size: 4rem; font-weight: 800; background: linear-gradient(135deg, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .count-label { color: var(--muted); font-size: 0.8rem; margin-top: 0.3rem; }
  label { display: block; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 0.5rem; }
  input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.85rem 1.1rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; margin-bottom: 1.2rem; }
  input:focus { border-color: var(--blue); }
  input[type="number"] { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; text-align: center; }
  .btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--blue), #1e40af); color: #fff; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(37,99,235,0.4); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.5); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .msg { margin-top: 1rem; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.88rem; text-align: center; display: none; }
  .msg.success { background: rgba(5,150,105,0.15); border: 1px solid rgba(5,150,105,0.3); color: #34d399; display: block; }
  .msg.error { background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.3); color: #f87171; display: block; }
  .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 2rem 0; }
  .note { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
  .subscribers-box { background: rgba(0,217,255,0.05); border: 1px solid rgba(0,217,255,0.15); border-radius: 12px; padding: 1.2rem; margin-top: 1.5rem; }
  .sub-count { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--cyan); }
  .sub-label { color: var(--muted); font-size: 0.78rem; margin-top: 0.2rem; }
  .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; margin-top: 0.8rem; transition: color 0.2s, border-color 0.2s; }
  .refresh-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Mastr Buildr</div>
  <h1>Admin Panel</h1>
  <p class="sub">Update the live project counter shown on your website. Only you can see this page.</p>

  <div class="current-count">
    <div class="count-num" id="currentNum">—</div>
    <div class="count-label">Projects currently live on site</div>
  </div>

  <div id="loginSection">
    <label>Admin Secret Key</label>
    <input type="password" id="adminKey" placeholder="Enter your ADMIN_SECRET_KEY…">
    <button class="btn" onclick="loadData()">Unlock Dashboard</button>
  </div>

  <div id="updateSection" style="display:none">
    <label>New Project Count</label>
    <input type="number" id="newCount" min="0" max="999" placeholder="e.g. 8">
    <button class="btn" id="updateBtn" onclick="updateCount()">Update Live Counter →</button>
    <div class="msg" id="msg"></div>

    <div class="divider"></div>

    <div class="subscribers-box">
      <div class="sub-count" id="subCount">—</div>
      <div class="sub-label">Newsletter subscribers</div>
      <button class="refresh-btn" onclick="loadSubscriberCount()">↻ Refresh</button>
    </div>
  </div>

  <div class="divider"></div>
  <p class="note">Changes go live immediately. The counter on the website updates every 30 seconds for visitors. Never share your admin key.</p>
</div>

<script>
  let adminKey = '';

  async function loadData() {
    adminKey = document.getElementById('adminKey').value.trim();
    if (!adminKey) { alert('Please enter your admin key.'); return; }

    try {
      // Fetch current count
      const res = await fetch('/.netlify/functions/projects');
      const data = await res.json();
      document.getElementById('currentNum').textContent = data.count ?? '—';
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('updateSection').style.display = 'block';
      loadSubscriberCount();
    } catch (e) {
      alert('Could not connect to backend. Check that Netlify functions are deployed.');
    }
  }

  async function updateCount() {
    const newCount = parseInt(document.getElementById('newCount').value, 10);
    const btn = document.getElementById('updateBtn');
    const msg = document.getElementById('msg');
    msg.className = 'msg';

    if (isNaN(newCount) || newCount < 0) {
      msg.textContent = 'Please enter a valid number.';
      msg.className = 'msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      const res = await fetch('/.netlify/functions/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
        body: JSON.stringify({ count: newCount }),
      });
      const data = await res.json();

      if (res.ok && data.success) {
        document.getElementById('currentNum').textContent = data.count;
        msg.textContent = `✓ Counter updated to ${data.count} — live on site now.`;
        msg.className = 'msg success';
        document.getElementById('newCount').value = '';
      } else {
        msg.textContent = data.error || 'Update failed. Check your admin key.';
        msg.className = 'msg error';
      }
    } catch (e) {
      msg.textContent = 'Network error. Please try again.';
      msg.className = 'msg error';
    }

    btn.disabled = false;
    btn.textContent = 'Update Live Counter →';
  }

  async function loadSubscriberCount() {
    // Note: this requires a Supabase service role key for counting
    // For now shows placeholder — wire up with your Supabase dashboard
    document.getElementById('subCount').textContent = 'See Supabase';
  }

  // Load current count on page open (no auth needed for GET)
  fetch('/.netlify/functions/projects')
    .then(r => r.json())
    .then(d => { document.getElementById('currentNum').textContent = d.count ?? '7'; })
    .catch(() => {});

  // Submit on Enter
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const section = document.getElementById('updateSection');
      if (section.style.display === 'none') loadData();
      else updateCount();
    }
  });
</script>
</body>
</html>
